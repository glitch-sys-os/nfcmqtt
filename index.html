<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC MQTT Toggle</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    text-align:center;
}
</style>

</head>
<body>

<div class="box">
<h2>NFC MQTT Control</h2>
<p id="status">Connecting...</p>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const topic = params.get("topic") || "home/relay1";
const message = params.get("message") || "TOGGLE";

const client = mqtt.connect(
"wss://f288df819d1148559024ed68c1add39f.s1.eu.hivemq.cloud:8884/mqtt",
{
    username:"Krishna",
    password:"987654321@Krishna",

    clientId:"web_" + Math.random().toString(16).substring(2,10),

    clean:true,
    reconnectPeriod:0,
    connectTimeout:10000
});

client.on("connect",()=>{

document.getElementById("status").innerHTML="Connected";

client.publish(topic,message,{qos:1},()=>{

document.getElementById("status").innerHTML="MQTT Published Successfully";

client.end();

});

});

client.on("error",(err)=>{

document.getElementById("status").innerHTML="Error : "+err.message;

client.end();

});

</script>

</body>
</html>
